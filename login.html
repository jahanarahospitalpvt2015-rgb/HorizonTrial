<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign In – Horizon Trials</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:'Nunito',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
.bg{
  position:fixed;inset:0;z-index:0;
  background:linear-gradient(135deg,#1e1b4b 0%,#312e81 35%,#4338ca 65%,#ea580c 100%);
  overflow:hidden;
}
.bg::before{content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);
  background-size:60px 60px;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;}
.o1{width:480px;height:480px;background:rgba(234,88,12,.2);top:-100px;right:-80px;}
.o2{width:350px;height:350px;background:rgba(99,102,241,.25);bottom:-80px;left:-60px;}
.login-nav{position:relative;z-index:10;height:72px;display:flex;align-items:center;
  justify-content:space-between;padding:0 5%;background:rgba(255,255,255,.96);
  border-bottom:3px solid #ea580c;box-shadow:0 2px 20px rgba(0,0,0,.1);}
.login-nav img{height:60px;width:auto;object-fit:contain;}
.nav-r{display:flex;gap:1rem;align-items:center;}
.nav-r a{font-size:.84rem;font-weight:700;color:#1e1b4b;text-decoration:none;
  padding:.5rem 1.1rem;border-radius:50px;transition:all .2s;}
.nav-r a:hover{color:#ea580c;}
.nav-r a.btn{background:linear-gradient(135deg,#ea580c,#c2410c);color:#fff;
  box-shadow:0 4px 14px rgba(234,88,12,.4);}
.nav-r a.btn:hover{transform:translateY(-2px);}
.page-body{position:relative;z-index:1;flex:1;display:flex;align-items:center;
  justify-content:center;padding:48px 20px;}
.card{background:#fff;border-radius:24px;
  box-shadow:0 32px 80px rgba(0,0,0,.35),0 0 0 1px rgba(234,88,12,.15);
  width:100%;max-width:440px;padding:48px 44px 40px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,#312e81,#ea580c,#f97316);}
.card-logo{display:flex;justify-content:center;margin-bottom:28px;}
.card-logo img{height:72px;width:auto;object-fit:contain;}
.card-title{font-family:'DM Serif Display',serif;font-size:1.7rem;color:#1e1b4b;
  text-align:center;margin-bottom:6px;}
.card-sub{font-size:.87rem;color:#64748b;text-align:center;margin-bottom:30px;line-height:1.6;}
.field{margin-bottom:18px;}
label{display:block;font-size:.75rem;font-weight:800;text-transform:uppercase;
  letter-spacing:.08em;color:#312e81;margin-bottom:6px;}
.inp-wrap{position:relative;}
.inp-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:.95rem;opacity:.4;}
input[type=email],input[type=password]{width:100%;padding:12px 14px 12px 40px;
  border:1.5px solid #e2e8f0;border-radius:12px;font-size:.9rem;
  font-family:'Nunito',sans-serif;color:#1e1b4b;background:#f8fafc;outline:none;
  transition:border-color .2s,box-shadow .2s;}
input:focus{border-color:#ea580c;box-shadow:0 0 0 4px rgba(234,88,12,.1);background:#fff;}
.form-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
.remember{display:flex;align-items:center;gap:7px;font-size:.82rem;color:#64748b;cursor:pointer;}
.remember input{accent-color:#ea580c;width:15px;height:15px;cursor:pointer;}
.forgot{font-size:.82rem;color:#ea580c;text-decoration:none;font-weight:700;transition:color .2s;}
.forgot:hover{color:#c2410c;}
.btn-signin{width:100%;padding:14px;
  background:linear-gradient(135deg,#312e81,#4338ca);
  color:#fff;border:none;border-radius:50px;font-size:.96rem;font-weight:800;
  font-family:'Nunito',sans-serif;cursor:pointer;letter-spacing:.03em;
  box-shadow:0 6px 24px rgba(49,46,129,.45);transition:transform .2s,box-shadow .2s;
  margin-bottom:18px;}
.btn-signin:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(49,46,129,.55);}
.divider{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e2e8f0;}
.divider span{font-size:.76rem;color:#94a3b8;}
.btn-register{display:block;width:100%;padding:12px;border:2px solid #312e81;
  border-radius:50px;color:#312e81;background:transparent;font-size:.92rem;font-weight:800;
  font-family:'Nunito',sans-serif;text-align:center;cursor:pointer;transition:all .2s;
  margin-bottom:22px;text-decoration:none;}
.btn-register:hover{background:#312e81;color:#fff;box-shadow:0 6px 20px rgba(49,46,129,.35);}
.signup-text{text-align:center;font-size:.83rem;color:#64748b;}
.signup-text a{color:#ea580c;font-weight:800;text-decoration:none;}
.signup-text a:hover{color:#c2410c;}
.login-footer{position:relative;z-index:10;text-align:center;padding:18px 5%;
  color:rgba(255,255,255,.5);font-size:.77rem;
  background:rgba(0,0,0,.2);backdrop-filter:blur(8px);}
.login-footer a{color:rgba(255,255,255,.6);text-decoration:none;margin:0 10px;}
.login-footer a:hover{color:#fed7aa;}
.error-msg{background:rgba(234,88,12,.1);border:1px solid rgba(234,88,12,.3);
  color:#c2410c;border-radius:10px;padding:.75rem 1rem;font-size:.82rem;
  font-weight:700;margin-bottom:14px;display:none;text-align:center;}
</style>
</head>

    <h1 class="card-title">Sign in to your account</h1>
    <p class="card-sub">Enter your credentials to access the platform</p>

    <div class="error-msg" id="errMsg">⚠️ Invalid email or password. Please try again.</div>

    <form onsubmit="handleLogin(event)">
      <div class="field">
        <label>Email Address</label>
        <div class="inp-wrap">
          <span class="inp-icon">✉️</span>
          <input type="email" id="loginEmail" placeholder="patient@horizon.ca" value="patient@horizon.ca" required/>
        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="inp-wrap">
          <span class="inp-icon">🔒</span>
          <input type="password" id="loginPass" placeholder="Enter your password" value="password" required/>
        </div>
      </div>
      <div class="form-row">
        <label class="remember"><input type="checkbox" checked/> Remember me</label>
        <a href="#" class="forgot">Forgot password?</a>
      </div>
      <button type="submit" class="btn-signin" id="signInBtn">Sign In →</button>
    </form>

    <div class="divider"><span>or</span></div>
    <a href="#" class="btn-register" id="register">Create New Account</a>
    <p class="signup-text">Don't have an account? <a href="#">Create one</a></p>
  </div>
</div>

<footer class="login-footer">
  <div>
    <a href="privacy.html">Privacy</a>
    <a href="terms.html">Terms</a>
    <a href="contact.html">Help</a>
  </div>
  <div style="margin-top:6px;font-size:.72rem;color:rgba(255,255,255,.3);">
    Horizon Clinical Trial Matching Platform
  </div>
</footer>

<script>
function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value;
  const pass  = document.getElementById('loginPass').value;
  const btn   = document.getElementById('signInBtn');
  const err   = document.getElementById('errMsg');
  err.style.display = 'none';
  btn.textContent = 'Signing in…'; btn.style.opacity = '0.75';
  setTimeout(() => {
    if (email === 'patient@horizon.ca' && pass === 'password') {
      window.location.href = 'dashboard.html';
    } else {
      btn.textContent = 'Sign In →'; btn.style.opacity = '1';
      err.style.display = 'block';
    }
  }, 1400);
}
</script>
